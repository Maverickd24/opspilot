<svg viewBox="0 0 980 620" xmlns="http://www.w3.org/2000/svg" font-family="IBM Plex Sans, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1B2430"/>
    </marker>
  </defs>

  <rect width="980" height="620" fill="#EEF0EC"/>

  <text x="30" y="40" font-size="22" font-weight="700" fill="#1B2430" letter-spacing="1">OpsPilot — Architecture</text>
  <text x="30" y="62" font-size="12" fill="#5B6470" font-family="IBM Plex Mono, monospace">upload → chunk → embed → retrieve → answer, per chat session</text>

  <!-- Browser -->
  <rect x="30" y="100" width="200" height="90" rx="4" fill="#FFFFFF" stroke="#CDC8BA" stroke-width="1.5"/>
  <text x="130" y="130" font-size="14" font-weight="600" fill="#1B2430" text-anchor="middle">Browser</text>
  <text x="130" y="150" font-size="11" fill="#5B6470" text-anchor="middle">index.html + app.js</text>
  <text x="130" y="166" font-size="11" fill="#5B6470" text-anchor="middle">chat UI, upload, doc list</text>

  <!-- FastAPI -->
  <rect x="330" y="100" width="220" height="90" rx="4" fill="#1B2430" stroke="#1B2430"/>
  <text x="440" y="130" font-size="14" font-weight="600" fill="#EEF0EC" text-anchor="middle">FastAPI Backend</text>
  <text x="440" y="150" font-size="11" fill="#CDC8BA" text-anchor="middle">/api/documents/upload</text>
  <text x="440" y="166" font-size="11" fill="#CDC8BA" text-anchor="middle">/api/chat  /api/sessions</text>

  <line x1="230" y1="145" x2="330" y2="145" stroke="#1B2430" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="330" y1="165" x2="230" y2="165" stroke="#1B2430" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Groq -->
  <rect x="700" y="100" width="220" height="90" rx="4" fill="#FFFFFF" stroke="#DC8A2E" stroke-width="1.5"/>
  <text x="810" y="130" font-size="14" font-weight="600" fill="#1B2430" text-anchor="middle">Groq API</text>
  <text x="810" y="150" font-size="11" fill="#5B6470" text-anchor="middle">Llama 3.1 (8B instant)</text>
  <text x="810" y="166" font-size="11" fill="#5B6470" text-anchor="middle">query rewrite + answer gen</text>

  <line x1="550" y1="135" x2="700" y2="135" stroke="#DC8A2E" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="700" y1="155" x2="550" y2="155" stroke="#DC8A2E" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Vertical connector down to pipeline -->
  <line x1="440" y1="190" x2="440" y2="230" stroke="#1B2430" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Pipeline row label -->
  <text x="440" y="222" font-size="11" fill="#5B6470" text-anchor="middle" font-family="IBM Plex Mono, monospace">on upload</text>

  <!-- pdf_processor -->
  <rect x="60" y="240" width="190" height="80" rx="4" fill="#FFFFFF" stroke="#CDC8BA" stroke-width="1.5"/>
  <text x="155" y="266" font-size="13" font-weight="600" fill="#1B2430" text-anchor="middle">pdf_processor.py</text>
  <text x="155" y="284" font-size="10.5" fill="#5B6470" text-anchor="middle">pypdf extract per page →</text>
  <text x="155" y="299" font-size="10.5" fill="#5B6470" text-anchor="middle">paragraph-aware chunking</text>

  <!-- embeddings -->
  <rect x="290" y="240" width="190" height="80" rx="4" fill="#FFFFFF" stroke="#CDC8BA" stroke-width="1.5"/>
  <text x="385" y="266" font-size="13" font-weight="600" fill="#1B2430" text-anchor="middle">embeddings.py</text>
  <text x="385" y="284" font-size="10.5" fill="#5B6470" text-anchor="middle">local sentence-transformers</text>
  <text x="385" y="299" font-size="10.5" fill="#5B6470" text-anchor="middle">all-MiniLM-L6-v2 (384-d)</text>

  <!-- vector store -->
  <rect x="520" y="240" width="190" height="80" rx="4" fill="#FFFFFF" stroke="#4B6A55" stroke-width="1.5"/>
  <text x="615" y="266" font-size="13" font-weight="600" fill="#1B2430" text-anchor="middle">vector_store.py</text>
  <text x="615" y="284" font-size="10.5" fill="#5B6470" text-anchor="middle">FAISS IndexFlatIP</text>
  <text x="615" y="299" font-size="10.5" fill="#5B6470" text-anchor="middle">one index per session_id</text>

  <!-- session store -->
  <rect x="750" y="240" width="170" height="80" rx="4" fill="#FFFFFF" stroke="#CDC8BA" stroke-width="1.5"/>
  <text x="835" y="266" font-size="13" font-weight="600" fill="#1B2430" text-anchor="middle">session_store.py</text>
  <text x="835" y="284" font-size="10.5" fill="#5B6470" text-anchor="middle">doc list + chat history</text>
  <text x="835" y="299" font-size="10.5" fill="#5B6470" text-anchor="middle">per session_id, in memory</text>

  <line x1="250" y1="280" x2="290" y2="280" stroke="#1B2430" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="480" y1="280" x2="520" y2="280" stroke="#1B2430" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- rag_service -->
  <line x1="440" y1="320" x2="440" y2="380" stroke="#1B2430" stroke-width="1.5"/>
  <line x1="440" y1="380" x2="615" y2="380" stroke="#1B2430" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="330" y="400" width="330" height="110" rx="4" fill="#FBF4EA" stroke="#DC8A2E" stroke-width="1.5"/>
  <text x="495" y="428" font-size="14" font-weight="600" fill="#1B2430" text-anchor="middle">rag_service.py — on each chat message</text>
  <text x="495" y="450" font-size="11" fill="#5B6470" text-anchor="middle">1. rewrite follow-up → standalone query (Groq)</text>
  <text x="495" y="467" font-size="11" fill="#5B6470" text-anchor="middle">2. embed query → top-k search in FAISS</text>
  <text x="495" y="484" font-size="11" fill="#5B6470" text-anchor="middle">3. generate answer strictly from retrieved chunks,</text>
  <text x="495" y="499" font-size="11" fill="#5B6470" text-anchor="middle">   with [n] citations, or say "not found" (Groq)</text>

  <line x1="615" y1="320" x2="615" y2="400" stroke="#1B2430" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Legend / notes -->
  <rect x="30" y="550" width="920" height="50" rx="4" fill="#FFFFFF" stroke="#CDC8BA"/>
  <text x="46" y="570" font-size="11.5" fill="#5B6470" font-family="IBM Plex Mono, monospace">Storage is in-memory, scoped per session_id — trade-off for a free-tier pilot host (see README "Known limitations").</text>
  <text x="46" y="587" font-size="11.5" fill="#5B6470" font-family="IBM Plex Mono, monospace">Every answer includes citations back to (filename, page) so an ops user can verify against the source document.</text>
</svg>
